services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: classmate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - .env.local
    environment:
      # Override DATABASE_URL to point to the local db service
      DATABASE_URL: postgresql://postgres:postgres@db:5432/classmate
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000

volumes:
  postgres_data:
